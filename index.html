<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f6f7fb" />
  <title>云销副驾 · AI 客户推进工作台</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="side-nav" aria-label="主导航">
      <button class="brand" data-action="go-today" aria-label="返回今日工作台">
        <span class="qq-penguin qq-penguin--brand" aria-hidden="true">
          <img src="assets/qq-penguin-reference.png" alt="" />
        </span>
        <span class="brand-copy"><b>云销副驾</b><small>客户推进工作台</small></span>
      </button>
      <nav class="primary-nav" id="primaryNav"></nav>
      <div class="side-bottom">
        <button class="side-create" data-action="new-customer"><i data-lucide="plus"></i> 新建客户</button>
        <div class="user-card"><span class="user-avatar">销</span><span><b>我的工作台</b><small>数据仅自己可见</small></span></div>
      </div>
    </aside>

    <div class="app-main">
      <header class="topbar">
        <button class="mobile-brand" data-action="go-today" aria-label="返回今日工作台">
          <span class="qq-penguin qq-penguin--brand" aria-hidden="true">
            <img src="assets/qq-penguin-reference.png" alt="" />
          </span>
          云销副驾
        </button>
        <div class="global-search">
          <span class="search-symbol"><i data-lucide="search"></i></span>
          <input id="globalSearch" type="search" autocomplete="off" placeholder="搜索客户、联系人或情报" aria-label="全局搜索" />
          <kbd>⌘ K</kbd>
        </div>
        <div class="top-actions">
          <button class="icon-button" id="themeToggle" aria-label="切换明暗主题" title="切换主题"><i data-lucide="moon-star"></i></button>
          <button class="secondary-button hide-mobile" data-action="manual-entry"><i data-lucide="square-pen"></i>手动记录</button>
          <button class="primary-button" data-action="focus-copilot"><i data-lucide="sparkles"></i><span class="hide-mobile">告诉 AI</span><span class="show-mobile">AI</span></button>
        </div>
      </header>

      <main id="pageRoot" class="page-root" tabindex="-1"></main>
    </div>

    <nav class="mobile-nav" id="mobileNav" aria-label="移动端导航"></nav>
    <button class="mobile-capture" data-action="focus-copilot" aria-label="用 AI 记录信息"><i data-lucide="sparkles"></i></button>
  </div>

  <div class="modal-layer hidden" id="modalLayer" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-hidden="true">
    <div class="modal-backdrop" data-action="close-modal"></div>
    <section class="modal-panel" id="modalPanel" tabindex="-1"></section>
  </div>

  <div class="report-layer hidden" id="reportLayer" role="dialog" aria-modal="true" aria-label="客户全景报告预览" aria-hidden="true" tabindex="-1">
    <div class="report-toolbar no-print">
      <div><b>客户全景报告</b><span id="reportStatus">客户报告预览</span></div>
      <div class="report-actions">
        <button class="secondary-button" data-action="export-word"><i data-lucide="file-type-2"></i> 导出 Word</button>
        <button class="primary-button" data-action="export-pdf"><i data-lucide="file-down"></i> 导出 PDF</button>
        <button class="icon-button" data-action="close-report" aria-label="关闭报告"><i data-lucide="x"></i></button>
      </div>
    </div>
    <article class="report-document" id="reportDocument"></article>
  </div>

  <div class="toast hidden" id="toast" role="status" aria-live="polite"></div>

  <script src="https://web.sdk.qcloud.com/cloudbase/js-sdk/2.7.4/tcb.js"></script>
  <script src="data.js"></script>
  <script src="cloudbase-config.js"></script>
  <script src="auth.js"></script>
  <script src="crm.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="report.js"></script>
  <script src="app.js"></script>
</body>
</html>
